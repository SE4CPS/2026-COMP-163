<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Flower Watering Status</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 2rem;
            max-width: 900px;
            margin: 0 auto;
        }
        h2 {
            margin-bottom: 1rem;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }
        th, td {
            padding: 10px 14px;
            border: 1px solid #ddd;
            text-align: left;
        }
        th {
            background-color: #f5f5f5;
            font-weight: bold;
        }
        tr:nth-child(even) {
            background-color: #fafafa;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 3px 10px;
            border-radius: 99px;
            font-size: 12px;
            font-weight: bold;
        }
        .badge-needs {
            color: #641717;
        }
        .badge-ok {
            color: #1b511e;
        }
        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }
        .dot-needs { background-color: #d62929; }
        .dot-ok    { background-color: #52ad4d; }

        button.water-btn {
            padding: 5px 14px;
            font-size: 13px;
            cursor: pointer;
            border: 1px solid #aaa;
            border-radius: 6px;
            background: #fff;
        }
        button.water-btn:hover {
            background: #e3f2fd;
            border-color: #1976d2;
            color: #1976d2;
        }
        button.water-btn:disabled {
            opacity: 0.4;
            cursor: default;
        }

        button.delete-btn {
            padding: 5px 14px;
            font-size: 13px;
            cursor: pointer;
            border: 1px solid #e57373;
            border-radius: 6px;
            background: #fff;
            color: #641717;
        }

        button.delete-btn:hover {
            background: #fde8e8;
        }

        input.add-input {
            padding: 5px 8px;
            font-size: 13px;
            border: 1px solid #ddd;
            border-radius: 4px;
            width: 100%;
            box-sizing: border-box;
        }

        button.add-btn {
            padding: 5px 14px;
            font-size: 13px;
            cursor: pointer;
            border: 1px solid #aaa;
            border-radius: 6px;
            background: #fff;
        }
        button.add-btn:hover {
            background: #e8f5e9;
            border-color: #2e7d32;
            color: #2e7d32;
        }

        #status-msg {
            margin-top: 1rem;
            font-size: 13px;
            color: #555;
            min-height: 20px;
        }
    </style>
</head>
<body>
    <h2>Flower Watering Status</h2>

    <table>
        <thead>
            <tr>
                <th>Name</th>
                <th>Last Watered</th>
                <th>Water Level</th>
                <th>Status</th>
                <th>Water</th>
                <th>Delete</th>
            </tr>
        </thead>
        <tr id="add-row">
            <td><input class="add-input" type="text" id="input-name" placeholder="Name" /></td>
            <td><input class="add-input" type="date" id="input-last-watered" /></td>
            <td><input class="add-input" type="number" id="input-water-level" placeholder="ex 20" /></td>
            <td><input class="add-input" type="number" id="input-min-water" placeholder="min required" /></td>
            <td></td>
            <td><button class="add-btn" onclick="addFlower()">ADD</button></td>
        </tr>
        <tbody id="flower-data"></tbody>
    </table>
    
    <p id="status-msg"></p>

    <script>
        const API = 'http://127.0.0.1:5001';

        function renderFlowers(data) {
            let rows = "";
            data.forEach(flower => {
                const needsWater = flower.needs_watering;

                const badge = needsWater
                    ? `<span class="badge badge-needs"><span class="dot dot-needs"></span>NEEDS WATER</span>`
                    : `<span class="badge badge-ok"><span class="dot dot-ok"></span>Hydrated :3</span>`;

                const btn = `<button class="water-btn" onclick="waterFlower(${flower.id})" ${!needsWater ? 'disabled' : ''}>
                    WATER
                </button>`;

                rows += `<tr id="row-${flower.id}">
                    <td>${flower.name}</td>
                    <td>${flower.last_watered}</td>
                    <td>${flower.water_level} inches</td>
                    <td>${badge}</td>
                    <td>${btn}</td>
                    <td><button class="delete-btn" onclick="deleteFlower(${flower.id})">DELETE</button></td>
                </tr>`;
            });
            document.getElementById("flower-data").innerHTML = rows;
        }

        function addFlower() {
            const name = document.getElementById('input-name').value;
            const lastWatered = document.getElementById('input-last-watered').value;
            const waterLevel = document.getElementById('input-water-level').value;
            const minWater = document.getElementById('input-min-water').value;

            if (!name || !lastWatered || !waterLevel || !minWater) {
                document.getElementById('status-msg').textContent = 'Please fill in all fields.';
                return;
            }

            fetch(`${API}/flowers`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    name: name,
                    last_watered: lastWatered,
                    water_level: parseInt(waterLevel),
                    min_water_required: parseInt(minWater)
                })
            })
            .then(response => response.json())
            .then(result => {
                document.getElementById('status-msg').textContent = result.message || 'Flower added!';
                document.getElementById('input-name').value = '';
                document.getElementById('input-last-watered').value = '';
                document.getElementById('input-water-level').value = '';
                document.getElementById('input-min-water').value = '';
                loadFlowers();
            })
            .catch(err => {
                document.getElementById('status-msg').textContent = 'Error adding flower: ' + err.message;
            });
        }

        function waterFlower(id) {
            fetch(`${API}/flowers/${id}/water_flower`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' }
            })
            .then(response => response.json())
            .then(result => {
                document.getElementById('status-msg').textContent =
                    result.message || `Flower #${id} watered successfully.`;
                loadFlowers();
            })
            .catch(err => {
                document.getElementById('status-msg').textContent =
                    `Error watering flower #${id}: ${err.message}`;
            });
        }

        function deleteFlower(id) {
            fetch(`${API}/flowers/${id}`, {
                method: 'DELETE'
            })
            .then(response => response.json())
            .then(result => {
                document.getElementById('status-msg').textContent =
                    result.message || `Flower #${id} deleted.`;
                loadFlowers();
            })
            .catch(err => {
                document.getElementById('status-msg').textContent =
                    `Error deleting flower #${id}: ${err.message}`;
            });
        }

        function loadFlowers() {
            fetch(`${API}/flowers`)
                .then(response => response.json())
                .then(data => renderFlowers(data))
                // debug
                .catch(err => {
                    document.getElementById('status-msg').textContent =
                        'could not load flowers: ' + err.message;
                });
        }

        loadFlowers();
    </script>
</body>
</html>
