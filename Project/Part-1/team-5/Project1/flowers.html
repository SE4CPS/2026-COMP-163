<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Flower Watering Status</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 2rem;
            max-width: 900px;
            margin: 0 auto;
        }
        h2 {
            margin-bottom: 1rem;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }
        th, td {
            padding: 10px 14px;
            border: 1px solid #ddd;
            text-align: left;
        }
        th {
            background-color: #f5f5f5;
            font-weight: bold;
        }
        tr:nth-child(even) {
            background-color: #fafafa;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 3px 10px;
            border-radius: 99px;
            font-size: 12px;
            font-weight: bold;
        }
        .badge-needs {
            color: #641717;
        }
        .badge-ok {
            color: #1b511e;
        }
        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }
        .dot-needs { background-color: #d62929; }
        .dot-ok    { background-color: #52ad4d; }

        button.water-btn {
            padding: 5px 14px;
            font-size: 13px;
            cursor: pointer;
            border: 1px solid #aaa;
            border-radius: 6px;
            background: #fff;
        }
        button.water-btn:hover {
            background: #e3f2fd;
            border-color: #1976d2;
            color: #1976d2;
        }
        button.water-btn:disabled {
            opacity: 0.4;
            cursor: default;
        }

        button.delete-btn {
            padding: 5px 14px;
            font-size: 13px;
            cursor: pointer;
            border: 1px solid #e57373;
            border-radius: 6px;
            background: #fff;
            color: #641717;
        }

         button.delete-btn:hover {
            background: #fde8e8;
        }

        #status-msg {
            margin-top: 1rem;
            font-size: 13px;
            color: #555;
            min-height: 20px;
        }
    </style>
</head>
<body>
    <h2>Flower Watering Status</h2>

    <table>
        <thead>
            <tr>
                <th>Name</th>
                <th>Last Watered</th>
                <th>Water Level</th>
                <th>Status</th>
                <th>Water</th>
                <th>Delete</th>
            </tr>
        </thead>
        <tbody id="flower-data"></tbody>
    </table>
    
    <p id="status-msg"></p>

    <script>
        const API = 'http://127.0.0.1:5001';

        function renderFlowers(data) {
            let rows = "";
            data.forEach(flower => {
                const needsWater = flower.needs_watering;

                const badge = needsWater
                    ? `<span class="badge badge-needs"><span class="dot dot-needs"></span>NEEDS WATER</span>`
                    : `<span class="badge badge-ok"><span class="dot dot-ok"></span>Hydrated :3</span>`;

                const btn = `<button class="water-btn" onclick="waterFlower(${flower.id})" ${!needsWater ? 'disabled' : ''}>
                    WATER
                </button>`;

                rows += `<tr id="row-${flower.id}">
                    <td>${flower.name}</td>
                    <td>${flower.last_watered}</td>
                    <td>${flower.water_level} inches</td>
                    <td>${badge}</td>
                    <td>${btn}</td>
                    <td><button class="delete-btn" onclick="deleteFlower(${flower.id})">DELETE</button></td>
                </tr>`;
            });
            document.getElementById("flower-data").innerHTML = rows;
        }

        function waterFlower(id) {
            fetch(`${API}/flowers/${id}/water_flower`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' }
            })
            .then(response => response.json())
            .then(result => {
                document.getElementById('status-msg').textContent =
                    result.message || `Flower #${id} watered successfully.`;
                loadFlowers();
            })
            .catch(err => {
                document.getElementById('status-msg').textContent =
                    `Error watering flower #${id}: ${err.message}`;
            });
        }

        function deleteFlower(id) {
            fetch(`${API}/flowers/${id}`, {
                method: 'DELETE'
            })
            .then(response => response.json())
            .then(result => {
                document.getElementById('status-msg').textContent =
                    result.message || `Flower #${id} deleted.`;
                loadFlowers();
            })
            .catch(err => {
                document.getElementById('status-msg').textContent =
                    `Error deleting flower #${id}: ${err.message}`;
            });
        }

        function loadFlowers() {
            fetch(`${API}/flowers`)
                .then(response => response.json())
                .then(data => renderFlowers(data))
                // debug
                .catch(err => {
                    document.getElementById('status-msg').textContent =
                        'could not load flowers: ' + err.message;
                });
        }

        loadFlowers();
    </script>
</body>
</html>
